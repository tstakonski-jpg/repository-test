name: AI maintenance (Gemini)

# This workflow does NOT run on git push. Start it from: Actions → this workflow → "Run workflow".
on:
  workflow_dispatch:
    inputs:
      issue_key:
        description: "Jira issue key (e.g. KAN-1)"
        required: true
        type: string
      issue_summary:
        description: "Issue summary from Jira"
        required: false
        type: string
        default: ""
      issue_description:
        description: "Issue description from Jira"
        required: false
        type: string
        default: ""
      mode:
        description: "fix or investigate"
        required: false
        type: string
        default: "fix"

permissions:
  contents: write
  pull-requests: write

jobs:
  gemini-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.AI_MAINTENANCE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-ai.txt

      # Optional repo variable GEMINI_MODEL; if unset, script defaults to gemini-2.5-flash.
      # Do not use gemini-2.0-flash (deprecated / unavailable for new API keys).
      - name: Run Gemini (analysis + files)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          ISSUE_KEY: ${{ inputs.issue_key }}
          ISSUE_SUMMARY: ${{ inputs.issue_summary }}
          ISSUE_DESCRIPTION: ${{ inputs.issue_description }}
          MODE: ${{ inputs.mode }}
        run: python3 scripts/ai_maint_gemini.py

      - name: Commit and push branch
        env:
          ISSUE_KEY: ${{ inputs.issue_key }}
        run: |
          BRANCH="ai-maint/${ISSUE_KEY}"
          git checkout -B "$BRANCH"
          git add docs/ai-runs
          if [ -d docs/ai-maint ]; then git add docs/ai-maint; fi
          git status
          git diff --staged --stat
          git commit -m "chore(ai-maint): Gemini run for ${ISSUE_KEY}"
          git push -u origin "$BRANCH"

      - name: Open pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.AI_MAINTENANCE_TOKEN }}
          ISSUE_KEY: ${{ inputs.issue_key }}
          ISSUE_SUMMARY: ${{ inputs.issue_summary }}
          MODE: ${{ inputs.mode }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 <<'PY'
          import os
          from pathlib import Path

          key = os.environ["ISSUE_KEY"]
          body = (
              f"Jira: **{key}**\n\n"
              f"**Summary:** {os.environ.get('ISSUE_SUMMARY', '')}\n\n"
              f"**Mode:** {os.environ.get('MODE', '')}\n\n"
              f"- Analysis: `docs/ai-runs/{key}-analysis.md`\n"
              f"- Deliverables: `docs/ai-maint/{key}/`\n\n"
              f"Workflow run: {os.environ['RUN_URL']}\n"
          )
          Path("pr-body.md").write_text(body, encoding="utf-8")
          PY
          # gh pr create does not support --json; on success it prints the PR URL to stdout.
          PR_URL=$(gh pr create \
            --base main \
            --head "ai-maint/${ISSUE_KEY}" \
            --title "[${ISSUE_KEY}] AI maintenance (Gemini)" \
            --body-file pr-body.md)
          PR_URL=$(echo -n "$PR_URL" | tr -d '\r' | tail -n1)
          echo "url=${PR_URL}" >> "${GITHUB_OUTPUT}"

      # GitHub does not allow `secrets` in job/step `if:` — skip at runtime when unset.
      - name: Notify bridge (Jira comment + link)
        env:
          BRIDGE_URL: ${{ secrets.BRIDGE_JIRA_NOTIFY_URL }}
          CALLBACK_SECRET: ${{ secrets.BRIDGE_CALLBACK_SECRET }}
          ISSUE_KEY: ${{ inputs.issue_key }}
          PR_URL: ${{ steps.pr.outputs.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${BRIDGE_URL}" ] || [ -z "${CALLBACK_SECRET}" ]; then
            echo "Bridge notify skipped (BRIDGE_JIRA_NOTIFY_URL or BRIDGE_CALLBACK_SECRET not set)."
            exit 0
          fi
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          issue = os.environ["ISSUE_KEY"]
          analysis_path = Path("docs/ai-runs") / f"{issue}-analysis.md"
          analysis = ""
          if analysis_path.is_file():
              analysis = analysis_path.read_text(encoding="utf-8")[:28000]

          pr_url = (os.environ.get("PR_URL") or "").strip()

          body: dict = {
              "issue_key": issue,
              "workflow_run_url": os.environ["RUN_URL"],
              "repository": os.environ["REPO"],
              "branch": f"ai-maint/{issue}",
              "analysis_markdown": analysis,
          }
          if pr_url:
              body["pull_request_url"] = pr_url

          req = urllib.request.Request(
              os.environ["BRIDGE_URL"].strip(),
              data=json.dumps(body).encode("utf-8"),
              headers={
                  "Content-Type": "application/json; charset=utf-8",
                  "X-Bridge-Callback-Secret": os.environ["CALLBACK_SECRET"].strip(),
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  print(resp.read().decode())
          except urllib.error.HTTPError as e:
              print(e.read().decode())
              raise
          PY
